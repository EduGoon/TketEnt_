<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2035"/>
      <stop offset="100%" stop-color="#0a0d14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c040" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f0c040" stop-opacity="0"/>
    </radialGradient>
    <filter id="f" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle glow behind spark -->
  <circle cx="16" cy="16" r="10" fill="url(#glow)"/>

  <!-- The ✦ spark — 4-pointed star, sharp and geometric -->
  <g filter="url(#f)" fill="#f0c040">
    <!-- Top point -->
    <polygon points="16,4 17.2,14 16,15.2 14.8,14" />
    <!-- Bottom point -->
    <polygon points="16,28 17.2,18 16,16.8 14.8,18" />
    <!-- Left point -->
    <polygon points="4,16 14,14.8 15.2,16 14,17.2" />
    <!-- Right point -->
    <polygon points="28,16 18,14.8 16.8,16 18,17.2" />
  </g>

  <!-- Small accent dot — top right, electric blue -->
  <circle cx="22.5" cy="9.5" r="1.5" fill="#60c8f0" opacity="0.9"/>
</svg>